  /* ===== LOGIN ===== */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1F3864,#2E75B6);padding:20px}
  .auth-card{background:#fff;border-radius:18px;padding:30px 28px;width:380px;box-shadow:0 18px 50px rgba(31,56,100,.22)}
  .logo-plate{background:var(--navy);border-radius:14px;padding:18px 24px;display:flex;justify-content:center;margin-bottom:16px}
  .logo-plate .masaru-logo{height:42px;width:204px}
  .sub-brand{text-align:center;color:var(--gold);font-weight:700;letter-spacing:3px;font-size:14px;margin-bottom:3px}
  .sub-desc{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px}
  .fld{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
  .fld label{font-size:13px;color:var(--muted);font-weight:600}
  .fld input,.fld select{padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .btn-primary{background:var(--gold);color:#3A2E00;border:none;border-radius:10px;padding:12px;font-weight:700;font-size:15px;width:100%}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed}
  .link{color:var(--gold);cursor:pointer;font-weight:700}
  .switch-line{margin-top:13px;text-align:center;color:var(--muted);font-size:14px}
  .msg{font-size:13px;margin-top:9px;min-height:18px}
  .msg.err{color:var(--red)} .msg.ok{color:var(--green)}
  .hide{display:none!important}
  .role-row{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--ink);margin-top:6px;cursor:pointer}
  .role-row input[type=checkbox]{width:16px;height:16px;cursor:pointer}
  .role-code{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:8px;margin:5px 0 4px 24px;max-width:calc(100% - 24px)}

  /* ===== HUB ===== */
  header.top{background:var(--navy);color:#fff;padding:14px 26px;display:flex;align-items:center;gap:14px;
    border-bottom:4px solid var(--gold)}
  header.top .masaru-logo{height:28px;width:136px}
  header.top .spacer{flex:1}
  .role-pill{background:rgba(255,255,255,.14);padding:5px 13px;border-radius:20px;font-size:13px;font-weight:600}
  .logout{background:transparent;border:1px solid #4A6394;color:#fff;border-radius:8px;padding:7px 14px;font-size:13px}

  main{max-width:1000px;margin:0 auto;padding:34px 22px}
  .hub-title{font-size:22px;color:var(--navy);font-weight:700;margin-bottom:4px}
  .hub-sub{color:var(--muted);margin-bottom:26px}
  .app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  .app-tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;cursor:pointer;
    transition:transform .12s, box-shadow .12s, border-color .12s;text-align:left;display:flex;flex-direction:column;gap:10px}
  .app-tile:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(31,56,100,.13);border-color:var(--gold)}
  .app-icon{font-size:38px;line-height:1}
  .app-name{font-size:18px;font-weight:700;color:var(--navy)}
  .app-desc{font-size:13.5px;color:var(--muted);line-height:1.5;flex:1}
  .app-note{font-size:12px;color:var(--amber);background:#FFFBEB;border-radius:7px;padding:5px 9px}
  .app-go{color:var(--gold);font-weight:700;font-size:14px;margin-top:2px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .app-newtab{color:var(--blue);font-weight:600;font-size:12px;border:1px solid var(--line);border-radius:7px;padding:4px 9px;background:#F8FAFC}
  .app-newtab:hover{background:#EEF2F8;border-color:var(--blue)}
  .empty-apps{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;
    background:#fff;border:1px dashed var(--line);border-radius:14px}
  .boot{min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--muted)}
</style>
</head>
<body>

<!-- ===== กำลังโหลด ===== -->
<div id="bootScreen" class="boot">กำลังโหลด...</div>

<!-- ===== LOGIN / SIGNUP ===== -->
<div id="authScreen" class="login-wrap hide">
  <div class="auth-card">
    <div class="logo-plate"><span class="masaru-logo"></span></div>
    <div class="sub-brand">PROCUREMENT HUB</div>
    <p class="sub-desc">ศูนย์รวมระบบฝ่ายจัดซื้อ</p>

    <!-- login -->
    <div id="loginBox">
      <div class="fld"><label>อีเมล</label><input id="email" type="email" placeholder="name@masaru.co.th" autocomplete="username"></div>
      <div class="fld"><label>รหัสผ่าน</label><input id="password" type="password" autocomplete="current-password"></div>
      <button class="btn-primary" id="loginBtn">เข้าสู่ระบบ</button>
      <div class="msg err hide" id="loginErr"></div>
      <div class="switch-line">ยังไม่มีบัญชี? <span class="link" id="toSignup">สมัครสมาชิก</span></div>
    </div>

    <!-- signup -->
    <div id="signupBox" class="hide">
      <div class="fld"><label>อีเมล</label><input id="suEmail" type="email" placeholder="name@masaru.co.th"></div>
      <div class="fld"><label>รหัสผ่าน (อย่างน้อย 6 ตัว)</label><input id="suPassword" type="password"></div>
      <div class="fld"><label>บทบาท</label>
        <select id="suRole">
          <option value="purchase">จัดซื้อ</option>
          <option value="marketing">การตลาด</option>
          <option value="head_purchase">หัวหน้าจัดซื้อ</option>
          <option value="executive">ผู้บริหาร</option>
        </select>
      </div>
      <div class="fld"><label>รหัสเชิญ</label><input id="suInvite" placeholder="ขอจากแอดมิน"></div>
      <button class="btn-primary" id="signupBtn">สมัครสมาชิก</button>
      <div class="msg err hide" id="signupErr"></div>
      <div class="msg ok hide" id="signupOk"></div>
      <div class="switch-line">มีบัญชีแล้ว? <span class="link" id="toLogin">เข้าสู่ระบบ</span></div>
    </div>
  </div>
</div>

<!-- ===== HUB ===== -->
<div id="hubScreen" class="hide">
  <header class="top">
    <span class="masaru-logo"></span>
    <span style="font-weight:600">ศูนย์รวมระบบฝ่ายจัดซื้อ</span>
    <div class="spacer"></div>
    <span class="role-pill" id="rolePill">—</span>
    <button class="logout" id="logoutBtn">ออกจากระบบ</button>
  </header>
  <main>
    <div class="hub-title" id="hubGreet">เลือกระบบที่ต้องการใช้งาน</div>
    <div class="hub-sub" id="hubSub">แตะการ์ดเพื่อเข้าใช้งาน</div>
    <div class="app-grid" id="appGrid"></div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://ykeplonjemxcqnrzznhm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xTe43UOuDChtOsmY_BCsPg_FMJNE7Ma';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = id => document.getElementById(id);

// ====================================================================
// ทะเบียนเว็บ — ตอนนี้ดึงจากตาราง portal_apps ใน Supabase
// (ค่าด้านล่างเป็น "ค่าสำรอง" ใช้เฉพาะตอน DB ยังไม่พร้อม/โหลดไม่ได้)
// ====================================================================
const APPS_FALLBACK = [
  { key:'board', icon:'📋', title:'Purchase Board',
    desc:'ติดตามสถานะ PO / SKU + แผนรับสินค้า แบบเรียลไทม์',
    url:'board.html', roles:['purchase','marketing'] },
  { key:'pr', icon:'📝', title:'ใบขอซื้อ (PR)',
    desc:'ออกใบขอซื้อ + ตรวจ AI + อนุมัติ + พิมพ์ PDF',
    url:'pr.html', roles:['purchase'] },
];

// ดึงรายการเว็บจากตาราง portal_apps (ถ้าไม่ได้ → ใช้ค่าสำรอง)
async function loadApps(){
  try{
    const { data, error } = await sb.from('portal_apps')
      .select('*').eq('active', true).order('sort_order');
    if(error || !data || !data.length) return APPS_FALLBACK;
    return data.map(a => ({
      key:a.app_key, icon:a.icon, title:a.title, desc:a.description,
      url:a.url, roles:a.roles || []
    }));
  }catch(e){ return APPS_FALLBACK; }
}

const ROLE_LABEL = { purchase:'จัดซื้อ', marketing:'การตลาด', pr_manager:'หัวหน้า (อนุมัติ)', pr_exec:'ผู้บริหาร', executive:'ผู้บริหาร' };
const ALLOWED = ['purchase','marketing','pr_manager','pr_exec','executive'];   // บทบาทที่เข้าหน้ารวมได้
const isExecRole = r => r==='pr_exec' || r==='executive';   // ผู้บริหาร = เห็นทุกระบบ

// อ่านบทบาททั้งหมดของบัญชี (รองรับทั้งแบบ array ใหม่ และ single เดิม)
function getRoles(session){
  const m = session.user?.app_metadata || {};
  if(Array.isArray(m.user_roles) && m.user_roles.length) return m.user_roles;
  if(m.user_role) return [m.user_role];
  return [];
}

// ===== BOOT =====
// ฟังการเปลี่ยนสถานะ auth — ถ้า logout ที่แท็บ/หน้าไหนก็ตาม หน้านี้กลับไปหน้า login ทันที
sb.auth.onAuthStateChange((event, session) => {
  if(event === 'SIGNED_OUT' || !session){ showAuth(); }
});

(async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ showHub(session); }
  else { showAuth(); }
})();

function showAuth(){
  $('bootScreen').classList.add('hide');
  $('hubScreen').classList.add('hide');
  $('authScreen').classList.remove('hide');
}

async function showHub(session){
  const roles = getRoles(session);
  const allowedRoles = roles.filter(r => ALLOWED.includes(r));
  if(!allowedRoles.length){
    // บัญชีที่ไม่ได้สมัครผ่านระบบนี้ → เด้งออก
    sb.auth.signOut();
    showAuth();
    showLoginErr('บัญชีนี้ไม่มีสิทธิ์เข้าใช้ระบบนี้ — ต้องสมัครสมาชิกผ่านหน้านี้เท่านั้น');
    return;
  }
  $('bootScreen').classList.add('hide');
  $('authScreen').classList.add('hide');
  $('hubScreen').classList.remove('hide');
  $('rolePill').textContent = 'บทบาท: ' + roles.map(r => ROLE_LABEL[r]||r).join(' · ');
  $('appGrid').innerHTML = '<div class="empty-apps">กำลังโหลดรายการระบบ...</div>';

  // ดึงรายการเว็บจากตาราง portal_apps แล้วกรองตามบทบาท (มี role ไหนตรงก็เห็น)
  // ผู้บริหาร → เห็นทุกระบบทั้งหมด (ไม่ต้องกรอง)
  const all = await loadApps();
  const isExec = roles.some(isExecRole);
  const apps = isExec ? all : all.filter(a => (a.roles||[]).some(r => roles.includes(r)));

  // มีเว็บเดียว → พาเข้าเว็บนั้นเลย ไม่ต้องเห็นหน้าเลือก
  if(apps.length === 1){
    window.location.replace(apps[0].url);
    return;
  }

  $('hubSub').textContent = apps.length
    ? `คุณมีสิทธิ์เข้าใช้งาน ${apps.length} ระบบ — แตะการ์ดเพื่อเปิดในแท็บใหม่ (เปิดพร้อมกันได้หลายเว็บ)`
    : 'ยังไม่มีระบบที่คุณมีสิทธิ์เข้าใช้งาน';

  $('appGrid').innerHTML = apps.length
    ? apps.map(a => `
      <div class="app-tile" data-url="${a.url}">
        <div class="app-icon">${a.icon}</div>
        <div class="app-name">${a.title}</div>
        <div class="app-desc">${a.desc}</div>
        <div class="app-go">เข้าใช้งาน →
          <span class="app-newtab" data-url="${a.url}" title="เปิดในแท็บใหม่">↗ แท็บใหม่</span>
        </div>
      </div>`).join('')
    : `<div class="empty-apps">ยังไม่มีระบบที่บทบาทนี้เข้าใช้งานได้<br>ติดต่อแอดมินเพื่อขอสิทธิ์เพิ่ม</div>`;

  // กดการ์ด = เข้าเว็บในแท็บเดิม
  document.querySelectorAll('.app-tile').forEach(t =>
    t.addEventListener('click', () => { window.location.href = t.dataset.url; }));
  // กดปุ่ม "แท็บใหม่" = เปิดแท็บใหม่ (ไม่ให้ทะลุไปโดนการ์ด)
  document.querySelectorAll('.app-newtab').forEach(b =>
    b.addEventListener('click', e => { e.stopPropagation(); window.open(b.dataset.url, '_blank'); }));
}

function showLoginErr(msg){ const e=$('loginErr'); e.textContent=msg; e.classList.remove('hide'); }

// ===== LOGIN =====
$('loginBtn').addEventListener('click', doLogin);
$('password').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
async function doLogin(){
  const email = $('email').value.trim(), password = $('password').value;
  $('loginErr').classList.add('hide');
  if(!email || !password){ showLoginErr('กรุณากรอกอีเมลและรหัสผ่าน'); return; }
  $('loginBtn').disabled = true; $('loginBtn').textContent = 'กำลังเข้าสู่ระบบ...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  $('loginBtn').disabled = false; $('loginBtn').textContent = 'เข้าสู่ระบบ';
  if(error){
    showLoginErr(/confirm/i.test(error.message)
      ? 'อีเมลนี้ยังไม่ได้ยืนยัน — แจ้งแอดมินปิด "ยืนยันอีเมล" ใน Supabase'
      : 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
    return;
  }
  showHub(data.session);
}

// ===== สลับ login / signup =====
$('toSignup').addEventListener('click', () => {
  $('loginErr').classList.add('hide');
  $('loginBox').classList.add('hide'); $('signupBox').classList.remove('hide');
});
$('toLogin').addEventListener('click', () => {
  $('signupErr').classList.add('hide'); $('signupOk').classList.add('hide');
  $('signupBox').classList.add('hide'); $('loginBox').classList.remove('hide');
});

// ===== SIGNUP (บทบาทสำเร็จรูป + รหัสเชิญ) =====
$('signupBtn').addEventListener('click', doSignup);
async function doSignup(){
  const email = $('suEmail').value.trim(), password = $('suPassword').value;
  const preset = $('suRole').value, invite = $('suInvite').value.trim();
  const err = $('signupErr'), ok = $('signupOk');
  err.classList.add('hide'); ok.classList.add('hide');

  if(!email || !password){ err.textContent='กรุณากรอกอีเมลและรหัสผ่าน'; err.classList.remove('hide'); return; }
  if(password.length < 6){ err.textContent='รหัสผ่านต้องอย่างน้อย 6 ตัว'; err.classList.remove('hide'); return; }
  if(!invite){ err.textContent='กรุณากรอกรหัสเชิญ'; err.classList.remove('hide'); return; }

  $('signupBtn').disabled = true; $('signupBtn').textContent = 'กำลังสมัคร...';
  const { error } = await sb.auth.signUp({ email, password,
    options: { data: { user_role_preset: preset, invite_code: invite } } });
  $('signupBtn').disabled = false; $('signupBtn').textContent = 'สมัครสมาชิก';
  if(error){
    err.textContent = 'สมัครไม่สำเร็จ — รหัสเชิญอาจไม่ถูกต้อง หรืออีเมลนี้ถูกใช้แล้ว';
    err.classList.remove('hide'); return;
  }
  $('suEmail').value=''; $('suPassword').value=''; $('suInvite').value='';
  ok.textContent = '🎉 สมัครสำเร็จ! กดปุ่ม "เข้าสู่ระบบ" เพื่อเริ่มใช้งาน';
  ok.classList.remove('hide');
}

$('logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });
</script>
</body>
</html>
